name: generate animation

on:
  # සෑම පැය 24කට වරක්ම auto update වෙන්න
  schedule:
    - cron: "0 */24 * * *" 
  
  # අවශ්‍ය ඕනෑම වෙලාවක manual run කරන්න පුළුවන් වෙන්න
  workflow_dispatch:
  
  # main branch එකට push කරන සෑම විටම run වෙන්න
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # සර්පයාගේ පින්තූරය (SVG) නිර්මාණය කිරීම
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # හදපු පින්තූරය output branch එකට push කිරීම
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
